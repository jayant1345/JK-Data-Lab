{% extends "base.html" %}
{% block title %}404 — Page Not Found — JK Data Lab{% endblock %}
{% block content %}
<section class="error-page">
  <div class="container">
    <div class="error-content glass-card">
      <div class="error-code gradient-text">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <a href="{{ url_for('public.index') }}" class="btn btn-primary">Back to Home</a>
    </div>
  </div>
</section>
{% endblock %}
