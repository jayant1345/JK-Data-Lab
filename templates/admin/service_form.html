{% extends "admin/base_admin.html" %}
{% block title %}Edit Service — Admin{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Edit Service</h1>
  <a href="{{ url_for('admin.services') }}" class="btn-admin-secondary">← Back</a>
</div>
<form method="POST" class="admin-form">
  <div class="form-card">
    <div class="form-group"><label>Title</label><input type="text" name="title" value="{{ service.title }}" required></div>
    <div class="form-group"><label>Description</label><textarea name="description" rows="4">{{ service.description }}</textarea></div>
    <div class="form-group"><label>Icon</label><input type="text" name="icon" value="{{ service.icon }}"></div>
    <div class="form-group"><label>Order</label><input type="number" name="order" value="{{ service.order }}"></div>
    <div class="form-group"><label><input type="checkbox" name="visible" {{ 'checked' if service.visible }}> Visible</label></div>
    <div class="form-group"><label>Pricing Basic</label><textarea name="pricing_basic" rows="2">{{ service.pricing_basic }}</textarea></div>
    <div class="form-group"><label>Pricing Standard</label><textarea name="pricing_standard" rows="2">{{ service.pricing_standard }}</textarea></div>
    <div class="form-group"><label>Pricing Premium</label><textarea name="pricing_premium" rows="2">{{ service.pricing_premium }}</textarea></div>
    <button type="submit" class="btn-admin-primary">Update Service</button>
  </div>
</form>
{% endblock %}
