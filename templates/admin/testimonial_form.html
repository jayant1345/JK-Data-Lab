{% extends "admin/base_admin.html" %}
{% block title %}{{ 'Edit' if testimonial else 'New' }} Testimonial — Admin{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{{ 'Edit' if testimonial else 'New' }} Testimonial</h1>
  <a href="{{ url_for('admin.testimonials') }}" class="btn-admin-secondary">← Back</a>
</div>
<form method="POST" enctype="multipart/form-data" class="admin-form">
  <div class="form-card">
    <div class="form-group"><label>Client Name *</label><input type="text" name="client_name" value="{{ testimonial.client_name if testimonial else '' }}" required></div>
    <div class="form-group"><label>Company</label><input type="text" name="company" value="{{ testimonial.company if testimonial else '' }}"></div>
    <div class="form-group"><label>Country</label><input type="text" name="country" value="{{ testimonial.country if testimonial else '' }}"></div>
    <div class="form-group"><label>Rating (1-5)</label><input type="number" name="rating" min="1" max="5" value="{{ testimonial.rating if testimonial else 5 }}"></div>
    <div class="form-group"><label>Testimonial Text *</label><textarea name="text" rows="5" required>{{ testimonial.text if testimonial else '' }}</textarea></div>
    <div class="form-group"><label>Date</label><input type="date" name="date" value="{{ testimonial.date.isoformat() if testimonial and testimonial.date else '' }}"></div>
    <div class="form-group"><label><input type="checkbox" name="visible" {{ 'checked' if not testimonial or testimonial.visible }}> Visible</label></div>
    <div class="form-group">
      <label>Client Photo</label>
      {% if testimonial and testimonial.photo %}<img src="{{ url_for('static', filename=testimonial.photo) }}" class="img-preview">{% endif %}
      <input type="file" name="photo" accept="image/*">
    </div>
    <button type="submit" class="btn-admin-primary">{{ 'Update' if testimonial else 'Add' }} Testimonial</button>
  </div>
</form>
{% endblock %}
